<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaryPhantomWife - Web Edition</title>
    <style>
        body {
            margin: 0;
            background-color: #0f0a14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: #c8c8ff;
        }
        canvas {
            border: 2px solid #b026ff;
            box-shadow: 0 0 20px #b026ff;
            background-color: #0f0a14;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            pointer-events: none;
        }
        .meter-container {
            width: 200px;
            height: 20px;
            background: #191432;
            border: 2px solid #c8c8ff;
            position: relative;
        }
        #phase-bar {
            width: 100%;
            height: 100%;
            background: #b026ff;
            transition: background 0.2s;
        }
        #phase-bar.phasing {
            background: #3c0a5a;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>
        <div style="font-size: 12px; margin-bottom: 4px; text-align: center;">PHASE METER (SPACE)</div>
        <div class="meter-container">
            <div id="phase-bar"></div>
        </div>
    </div>
    <div id="score" style="font-size: 24px;">Ectoplasms: 0</div>
</div>

<div class="instructions">Arrows/WASD to Move | SPACE to Phase | R to Restart</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const phaseBar = document.getElementById('phase-bar');

    canvas.width = 800;
    canvas.height = 600;

    const TILE_SIZE = 40;
    const NEON_PURPLE = "#b026ff";
    const DARK_PURPLE = "#3c0a5a";
    const NEON_CYAN = "#00ffff";
    const YELLOW = "#ffff00";
    const WALL_COLOR = "#191432";

    const MAZE_DATA = [
        "11111111111111111111",
        "10000000000000000001",
        "10111011111111011101",
        "10100000011000000101",
        "10101111011011110101",
        "10001000000000010001",
        "11101011100111010111",
        "10000010000001000001",
        "10111110111101111101",
        "10000000000000000001",
        "10111011111111011101",
        "10001000011000010001",
        "11101111011011110111",
        "10000000000000000001",
        "11111111111111111111"
    ];

    let walls = [];
    let ectoplasms = [];
    let GameState = "PLAYING";

    // Audio context for the pick-up beep
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    class Player {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = TILE_SIZE * 1.5;
            this.y = TILE_SIZE * 1.5;
            this.radius = 14;
            this.speed = 3.5;
            this.phasing = false;
            this.phaseMeter = 100;
        }
        update(keys) {
            let dx = 0, dy = 0;
            if (keys['ArrowLeft'] || keys['a']) dx = -this.speed;
            if (keys['ArrowRight'] || keys['d']) dx = this.speed;
            if (keys['ArrowUp'] || keys['w']) dy = -this.speed;
            if (keys['ArrowDown'] || keys['s']) dy = this.speed;

            if (keys[' '] && this.phaseMeter > 0) {
                this.phasing = true;
                this.phaseMeter -= 0.8;
                phaseBar.classList.add('phasing');
            } else {
                this.phasing = false;
                if (this.phaseMeter < 100) this.phaseMeter += 0.2;
                phaseBar.classList.remove('phasing');
            }
            if (this.phaseMeter < 0) this.phaseMeter = 0;
            phaseBar.style.width = this.phaseMeter + "%";

            let nextX = this.x + dx;
            let nextY = this.y + dy;

            if (!this.phasing) {
                let collision = false;
                for (let wall of walls) {
                    if (nextX + this.radius > wall.x && nextX - this.radius < wall.x + TILE_SIZE &&
                        nextY + this.radius > wall.y && nextY - this.radius < wall.y + TILE_SIZE) {
                        collision = true;
                        break;
                    }
                }
                if (!collision) {
                    this.x = nextX;
                    this.y = nextY;
                }
            } else {
                this.x = nextX;
                this.y = nextY;
            }

            // Screen boundaries
            this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

            // Ectoplasm collection
            for (let i = ectoplasms.length - 1; i >= 0; i--) {
                let e = ectoplasms[i];
                let dist = Math.hypot(this.x - (e.x + 4), this.y - (e.y + 4));
                if (dist < this.radius + 4) {
                    ectoplasms.splice(i, 1);
                    playBeep();
                    if (ectoplasms.length === 0) GameState = "WIN";
                }
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.phasing ? DARK_PURPLE : NEON_PURPLE;
            ctx.fill();
            if (this.phasing) {
                ctx.strokeStyle = NEON_PURPLE;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
    }

    class Enemy {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.radius = 16;
            this.speed = 2;
            this.vx = 0;
            this.vy = 0;
            this.dir = {x: 0, y: 0};
        }
        update(player) {
            if (this.type === "follow") {
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                let dist = Math.hypot(dx, dy);
                this.vx = (dx / dist) * this.speed;
                this.vy = (dy / dist) * this.speed;
            } else {
                if (Math.random() < 0.02 || (this.vx === 0 && this.vy === 0)) {
                    let dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
                    let d = dirs[Math.floor(Math.random() * dirs.length)];
                    this.vx = d.x * this.speed;
                    this.vy = d.y * this.speed;
                }
            }

            let nextX = this.x + this.vx;
            let nextY = this.y + this.vy;
            let collision = false;
            for (let wall of walls) {
                if (nextX + this.radius > wall.x && nextX - this.radius < wall.x + TILE_SIZE &&
                    nextY + this.radius > wall.y && nextY - this.radius < wall.y + TILE_SIZE) {
                    collision = true;
                    break;
                }
            }
            if (!collision) {
                this.x = nextX;
                this.y = nextY;
            } else if (this.type === "random") {
                this.vx = 0; this.vy = 0;
            }

            // Catching player
            let dist = Math.hypot(this.x - player.x, this.y - player.y);
            if (dist < this.radius + player.radius - 5) {
                GameState = "LOSS";
            }
        }
        draw() {
            ctx.fillStyle = YELLOW;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0.2 * Math.PI, 1.8 * Math.PI);
            ctx.lineTo(this.x, this.y);
            ctx.fill();
        }
    }

    let player = new Player();
    let enemies = [];

    function init() {
        walls = [];
        ectoplasms = [];
        enemies = [];
        GameState = "PLAYING";
        player.reset();
        
        MAZE_DATA.forEach((row, r) => {
            row.split('').forEach((char, c) => {
                let x = c * TILE_SIZE;
                let y = r * TILE_SIZE;
                if (char === '1') walls.push({x, y});
                else if (char === '0') ectoplasms.push({x: x + 16, y: y + 16});
            });
        });

        enemies.push(new Enemy(canvas.width - TILE_SIZE * 1.5, canvas.height - TILE_SIZE * 1.5, "follow"));
        enemies.push(new Enemy(canvas.width - TILE_SIZE * 1.5, TILE_SIZE * 1.5, "random"));
    }

    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === 'r' && GameState !== "PLAYING") init();
        if (e.key === ' ') e.preventDefault();
    });
    window.addEventListener('keyup', e => keys[e.key] = false);

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (GameState === "PLAYING") {
            player.update(keys);
            enemies.forEach(e => e.update(player));
        }

        // Draw Walls
        ctx.fillStyle = WALL_COLOR;
        ctx.strokeStyle = NEON_PURPLE;
        walls.forEach(w => {
            ctx.fillRect(w.x, w.y, TILE_SIZE, TILE_SIZE);
            ctx.strokeRect(w.x, w.y, TILE_SIZE, TILE_SIZE);
        });

        // Draw Ecto
        ctx.fillStyle = NEON_CYAN;
        ectoplasms.forEach(e => {
            ctx.fillRect(e.x, e.y, 8, 8);
        });

        player.draw();
        enemies.forEach(e => e.draw());

        scoreElement.innerText = `Ectoplasms: ${ectoplasms.length}`;

        if (GameState === "WIN") {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = NEON_CYAN;
            ctx.font = "bold 48px Arial";
            ctx.textAlign = "center";
            ctx.fillText("YOU SURVIVED!", canvas.width/2, canvas.height/2);
            ctx.font = "24px Arial";
            ctx.fillText("Press R to Restart", canvas.width/2, canvas.height/2 + 50);
        } else if (GameState === "LOSS") {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = NEON_PURPLE;
            ctx.font = "bold 48px Arial";
            ctx.textAlign = "center";
            ctx.fillText("BUSTED BY THE HUNTERS!", canvas.width/2, canvas.height/2);
            ctx.font = "24px Arial";
            ctx.fillStyle = "#c8c8ff";
            ctx.fillText("Press R to Restart", canvas.width/2, canvas.height/2 + 50);
        }

        requestAnimationFrame(loop);
    }

    init();
    loop();
</script>
</body>
</html>
